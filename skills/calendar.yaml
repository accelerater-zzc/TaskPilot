name: calendar
description: "管理日历事件：创建、查询日程安排"
tools:
  - name: create_event
    description: "创建日历事件"
    input_schema:
      type: object
      properties:
        title:
          type: string
          description: "事件标题"
        start_time:
          type: string
          description: "ISO 8601 格式，如：2026-06-05T10:00:00"
        duration_minutes:
          type: integer
          description: "持续时长（分钟），默认 60"
      required: [title, start_time]
  - name: list_events
    description: "查询某天的所有日程"
    input_schema:
      type: object
      properties:
        date:
          type: string
          description: "YYYY-MM-DD 格式，如：2026-06-05"
      required: [date]
